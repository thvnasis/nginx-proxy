events {}

http {
  resolver 127.0.0.11 valid=30s;

  server {
    listen 80;

    # 1. EXACT match for the root landing page
    location = / {
      proxy_pass https://techwb.org/;
      proxy_set_header Host techwb.org;
      proxy_ssl_server_name on;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Your specific accommodation pages stay exactly the same
    location /rabit-delux-retreat {
      rewrite ^/rabit-delux-retreat/?(.*)$ /$1 break;
      proxy_pass http://rabit-delux-retreat.railway.internal:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Optional: Pass through standard assets so the techwb.org page doesn't break
    # Add any other asset folders techwb.org uses (like /css/ or /images/) if needed
    location /assets/ {
      proxy_pass https://techwb.org/assets/;
      proxy_set_header Host techwb.org;
      proxy_ssl_server_name on;
    }

    # 4. CATCH-ALL for everything else
    # Redirects any unmatched path back to the root landing page
    location / {
      return 301 /;
    }
  }
}
