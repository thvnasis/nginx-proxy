events {}

http {
  server {
    listen 80;

    # Landing page
    location / {
      proxy_pass http://santa-monica-coastal.railway.internal:80;
      proxy_set_header Host $host;
    }

    # Example accommodation
    location /rabit-delux-ii/ {
      proxy_pass http://rabit-delux-retreat.railway.internal:80/rabit-delux-ii/;
      proxy_set_header Host $host;
    }

  }
}
