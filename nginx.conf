events {}

http {
  resolver 127.0.0.11 valid=30s;

  server {
    listen 80;

    location / {
      proxy_pass https://https://techwb.org/;
      proxy_ssl_server_name on;
      proxy_set_header Host https://techwb.org;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /rabit-delux-retreat {
      rewrite ^/rabit-delux-retreat/?(.*)$ /$1 break;
      proxy_pass http://rabit-delux-retreat.railway.internal:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
